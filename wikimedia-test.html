<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wikimedia Test 2</title>
<style>
  body { font-family: sans-serif; padding: 24px; max-width: 500px; margin: 0 auto; background: #f5f5f5; }
  input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; margin-bottom: 10px; box-sizing: border-box; }
  button { background: #1a5c38; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 1rem; cursor: pointer; }
  #result { margin-top: 20px; }
  #result img { width: 100%; border-radius: 10px; }
  #result p { font-size: 0.85rem; color: #555; margin-top: 6px; }
  #result .err { color: red; }
</style>
</head>
<body>
<h2>🌿 Wikimedia afbeelding test v2</h2>
<input type="text" id="soort" placeholder="Typ een soortnaam" value="Struikheide" />
<button onclick="zoek()">Zoek afbeelding</button>
<div id="result"></div>

<script>
function getThumb(wiki, naam) {
  return fetch('https://' + wiki + '.wikipedia.org/w/api.php?action=query&titles=' + encodeURIComponent(naam) + '&prop=pageimages&format=json&pithumbsize=400&origin=*')
  .then(function(res) { return res.json(); })
  .then(function(data) {
    var pages = data.query.pages;
    var page = pages[Object.keys(pages)[0]];
    return (page && page.thumbnail) ? page.thumbnail.source : null;
  });
}

// Zoek via Wikipedia redirect/zoekfunctie naar de juiste paginatitel
function searchTitle(naam) {
  return fetch('https://nl.wikipedia.org/w/api.php?action=query&list=search&srsearch=' + encodeURIComponent(naam) + '&srlimit=1&format=json&origin=*')
  .then(function(res) { return res.json(); })
  .then(function(data) {
    if (data.query.search.length > 0) {
      return data.query.search[0].title;
    }
    return null;
  });
}

function zoek() {
  var soort = document.getElementById('soort').value.trim();
  var result = document.getElementById('result');
  result.innerHTML = 'Zoeken...';

  // Stap 1: probeer NL wikipedia direct
  getThumb('nl', soort)
  .then(function(url) {
    if (url) return url;
    // Stap 2: zoek via NL wikipedia zoekfunctie
    return searchTitle(soort).then(function(title) {
      if (!title) return null;
      return getThumb('nl', title);
    });
  })
  .then(function(url) {
    if (url) return url;
    // Stap 3: probeer EN wikipedia
    return getThumb('en', soort);
  })
  .then(function(url) {
    if (url) {
      result.innerHTML = '<img src="' + url + '" alt="' + soort + '"><p>' + soort + ' — via Wikimedia Commons</p>';
    } else {
      result.innerHTML = '<p class="err">Geen afbeelding gevonden voor "' + soort + '"</p>';
    }
  })
  .catch(function(e) {
    result.innerHTML = '<p class="err">Fout: ' + e.message + '</p>';
  });
}
</script>
</body>
</html>
